
stages:
  - security-scan
  - publish

variables:
  GITHUB_REPO: "https://x-access-token:${GITHUB_TOKEN}@github.com/aws-samples/sample-thailand-secure-lz.git"
  TARGET_BRANCH: "main"

# ─────────────────────────────────────────────
# Stage 1: Secret Scanning (mandatory before push)
# ─────────────────────────────────────────────
secret-scan:
  stage: security-scan
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq git git-secrets
    - git secrets --install
    - git secrets --register-aws
  script:
    - echo "Running git-secrets scan..."
    - git secrets --scan
    - echo "Secret scan passed. No secrets detected."
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v.*/'

# ─────────────────────────────────────────────
# Stage 2: Publish to GitHub aws-samples
# ─────────────────────────────────────────────
publish-to-github:
  stage: publish
  image: alpine:latest
  needs:
    - secret-scan
  before_script:
    - apk add --no-cache git
    - git config --global user.email "kuokk@amazon.com"
    - git config --global user.name "Kim Kuok Chiang"
    - git remote add github "${GITHUB_REPO}" || git remote set-url github "${GITHUB_REPO}"
  script:
    - echo "Pushing to GitHub aws-samples/sample-thailand-secure-lz..."
    - git push github HEAD:${TARGET_BRANCH} --force
    - echo "Successfully published to GitHub!"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
  environment:
    name: github-aws-samples
    url: https://github.com/aws-samples/sample-thailand-secure-lz

